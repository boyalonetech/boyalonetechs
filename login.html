<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="/styles/styles.css" />
  </head>
  <body>
    <div class="container1" id="signIn" style="display: none">
      <h1 class="form-title" style="color: #000">Register</h1>
      <form action="#" method="POST">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input
            type="text"
            name="fName"
            id="fName"
            autocomplete="username"
            placeholder="First Name"
            required
          />
          <label for="fName">First Name</label>
        </div>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input
            type="text"
            name="lName"
            id="lName"
            autocomplete="username"
            placeholder="Last Name"
            required
          />
          <label for="lName">Last Name</label>
        </div>
        <div class="input-group">
          <i class="fa fa-envelope"></i>
          <input
            type="email"
            name="email"
            id="email"
            autocomplete="email"
            placeholder="Email"
            required
          />
          <label for="email">Email</label>
          <div class="input-group">
            <i class="fas fa-key"></i>
            <input
              type="password"
              name="password"
              id="password"
              autocomplete="current-password"
              placeholder="Password"
              required
            />
            <label for="password">Password</label>
          </div>
        </div>
        <input
          type="submit"
          value="Sign Up"
          class="btn"
          name="SignUp"
          onclick="openPopup()"
        />
        <p class="or">----------or----------</p>

        <div class="icons">
          <i class="fab fa-google"></i>
          <i class="fab fa-facebook"></i>
        </div>

        <div class="links">
          <p>Already Have Account ?</p>
          <button id="signInButton">Sign Up</button>
        </div>

        <!-- ============= pop up ========== -->
        <div class="popup" id="popup">
          <div class="lbody">
            <img
              src="assets/verified-iconwebp.webp"
              alt="icon"
              style="scale: 0.7"
              id="popimg2"
            />
            <h1
              style="margin-left: 85%; margin-top: -5%; cursor: pointer"
              onclick="closePopup()"
            >
              <span style="color: #ff0000; font-size: 24px">❌</span>
            </h1>
            <h2>Thank you!</h2>
            <p>Your details have successfully been submitted. Thanks!</p>
            <a href="index.html"
              ><button
                type="button"
                onclick="setUserName()"
                id="myBtn"
                class="popbtn"
              >
                Continue
              </button></a
            >
          </div>
        </div>
      </form>
    </div>

    <div class="container1" id="signUp">
      <h1 class="form-title" style="color: #000">Sign In</h1>
      <form action="" method="POST">
        <div class="input-group">
          <i class="fa fa-envelope"></i>
          <input
            type="email"
            name="email"
            id="email"
            autocomplete="email"
            placeholder="Email"
            required
          />
          <label for="email">Email</label>
          <div class="input-group">
            <i class="fas fa-key"></i>
            <input
              type="password"
              name="password"
              id="password"
              autocomplete="current-password"
              placeholder="Password"
              required
            />
            <label for="password">Password</label>
          </div>
        </div>
        <p class="recover">
          <a href="#">Recover Password</a>
        </p>
        <input
          type="submit"
          value="Sign Up"
          class="btn"
          name="SignIn"
          onclick="openPopup()"
        />
        <p class="or">----------or----------</p>

        <div class="icons">
          <i class="fab fa-google"></i>
          <i class="fab fa-facebook"></i>
        </div>

        <div class="links">
          <p>Don't Have Account ?</p>
          <button id="signUpButton">Sign Up</button>
        </div>
      </form>
    </div>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "poppins", sans-serif;
      }

      body {
        background-color: #c9d6ff;
        background: linear-gradient(to right, #000, rgb(0, 191, 255));
      }

      .container1 {
        background: #fff;
        width: 450px;
        padding: 1.5rem;
        margin: 50px auto;
        border-radius: 10px;
        box-shadow: 0 30px 35px rgba(0, 0, 1, 0.9);
      }
      .links p {
        color: #000;
      }

      form {
        margin: 0 2rem;
      }

      .form-title {
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        padding: 1.3rem;
        margin-bottom: 0.4rem;
      }

      input {
        /* text-decoration: none; */
        counter-reset: inherit;
        width: 100%;
        background-color: transparent;
        border: none;
        border-bottom: 1px solid #757575;
        padding-left: 1.5rem;
        font-size: 15px;
      }

      .input-group {
        padding: 1% 0;
        position: relative;
      }

      .input-group i {
        position: absolute;
        color: #000;
      }

      input:focus {
        background-color: transparent;
        outline: transparent;
        border: none;
        border-bottom: 2px solid rgb(0, 191, 255);
      }

      input::placeholder {
        color: transparent;
      }

      label {
        color: #757575;
        position: relative;
        left: 1.2em;
        top: -1.3em;
        cursor: auto;
        transition: 0.3s ease all;
      }

      input:focus ~ label,
      input:not(:placeholder-shown) ~ label {
        top: -3em;
        color: rgb(0, 191, 255);
        font-size: 15px;
      }

      .recover {
        text-align: right;
        font-size: 1rem;
        margin-bottom: 1rem;
      }

      .recover a {
        text-decoration: none;
        color: rgb(0, 191, 255);
      }

      .recovery a:hover {
        color: blue;
        text-decoration: underline;
      }

      .btn {
        font-size: 1.1rem;
        padding: 8px 0;
        border-radius: 5px;
        outline: none;
        border: none;
        width: 100%;
        background: rgb(0, 191, 255);
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #08001f;
        border-radius: 20px;
      }

      .or {
        font-size: 1.1rem;
        margin-top: 0.5rem;
        text-align: center;
      }

      .icons {
        text-align: center;
      }

      .icons i {
        color: rgb(0, 191, 255);
        padding: 0.8rem 1.5rem;
        border-radius: 10px;
        font-size: 1.5rem;
        cursor: pointer;
        border: 2px solid #dfe9f5;
        margin: 0 15px;
        transition: 1s;
      }

      .icons i:hover {
        background: #07001f;
        font-size: 1.6rem;
        border: 2px solid rgb(125, 125, 235);
      }

      .links {
        display: flex;
        justify-content: space-around;
        padding: 0 3rem;
        margin-top: 0.9rem;
        font-weight: bold;
      }

      button {
        color: rgb(0, 191, 255);
        background-color: transparent;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
      }

      button:hover {
        text-decoration: underline;
        color: rgb(202, 19, 202);
      }

      .btn:active {
        color: rgb(125, 125, 235);
        background-color: #bcb9b9;
      }

      /* ============== Popup ================ */

      .popup {
        width: 400px;
        background-color: #000;
        border-radius: 6px;
        position: absolute;
        top: 0%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.1);
        text-align: center;
        padding-left: 0 30px 30px;
        color: #333;
        box-shadow: 0 500% black;
        visibility: hidden;
        transition: transform 0.3s, top 0.3s;
      }

      .open-popup {
        visibility: visible;
        top: 50%;
        transform: translate(-50%, -50%) scale(1.1);
      }

      .popup img {
        width: 100px;
        margin-top: -50px;
        border-radius: 50%;
        box-shadow: 0 2px 5px rgba(255, 0, 0, 0.2);
        margin-bottom: -10%;
      }

      .popup h2 {
        font-size: 38px;
        font-weight: 500;
        margin: 30px 0 10px;
        color: #fff;
      }

      .popup p {
        color: #fff;
      }

      .popbtn {
        width: 80%;
        margin-bottom: 3%;
        margin-top: 50px;
        padding: 10px 0;
        background-color: #f00;
        color: #fff;
        border: 0;
        outline: none;
        font-size: 18px;
        border-radius: 4px;
        cursor: pointer;
        box-shadow: 0 0px 7px #989595;
      }

      @media (max-width: 425px) {
        #login {
          width: 75%;
          max-width: 350px;
          padding-bottom: -30%;
        }

        #limg {
          scale: 0.8;
          border-radius: 50%;
        }

        .keys {
          margin-top: -38%;
          scale: 0.94;
          width: 150%;
          margin-left: -26%;
        }

        .lbtn {
          padding: 5px 10px;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        #lbody {
          padding-bottom: -30%;
        }

        .prompt {
          scale: 0.8;
          padding-bottom: 30%;
        }

        #popup {
          scale: 0.5;
          margin-top: -30%;
          margin-left: -54%;
        }

        #popicon2 {
          padding-bottom: 10%;
        }
      }

      @media (min-width: 426px) and (max-width: 768px) {
        #login {
          width: 75%;
          max-width: 350px;
          padding-bottom: -30%;
        }
        .lbtn {
          padding: 5px 10px;
        }

        .form-box {
          display: none;
        }
        #limg {
          scale: 0.8;
          border-radius: 50%;
        }

        .keys {
          margin-top: -10%;
          scale: 0.94;
          width: 130%;
          margin-left: -16%;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        #lbody {
          padding-bottom: -30%;
        }
      }
    </style>

    <script>
      // ================ Login Page ================
      const signUpButton = document.getElementById("signUpButton");
      const signInButton = document.getElementById("signInButton");
      const signInForm = document.getElementById("signIn");
      const signUpForm = document.getElementById("signUp");

      signUpButton.addEventListener("click", function () {
        signInForm.style.display = "block";
        signUpForm.style.display = "none";
      });

      signInButton.addEventListener("click", function () {
        signInForm.style.display = "none";
        signUpForm.style.display = "block";
      });

      // ================ Popup ================

      let popup = document.getElementById("popup");
      let login = document.getElementById("login");

      function openPopup() {
        popup.classList.add("open-popup");
        login.classList.add("login");
      }

      function closePopup() {
        popup.classList.remove("open-popup");
      }
    </script>
  </body>
</html>
