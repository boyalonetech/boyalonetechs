<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Boy Alone Techs</title>
    <link
      rel="icon"
      href="/assets/images/90735684-ed11-45cd-91ee-5bda2f0f057d.png"
    />
    <script src="/scripts/main.js" defer></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "poppins", sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: linear-gradient(to right, #000, rgb(0, 191, 255));
      }

      .reduce-opacity {
        /* opacity: 70%;
        background-image: linear-gradient(to right, #000, rgb(0, 191, 255));
        backdrop-filter: blur(30px); */
        visibility: hidden;
      }

      .container1 {
        background: #fff;
        width: 450px;
        padding: 1.5rem;
        margin: 120px auto;
        border-radius: 10px;
        box-shadow: 0 30px 35px rgba(0, 0, 1, 0.9);
      }
      .links p {
        color: #000;
      }

      section {
        margin: 0 2rem;
      }

      .form-title {
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        padding: 1.3rem;
        margin-bottom: 0.4rem;
      }

      input {
        counter-reset: inherit;
        width: 100%;
        background-color: transparent;
        border: none;
        border-bottom: 1px solid #757575;
        padding-left: 1.5rem;
        font-size: 15px;
      }

      .input-group {
        padding: 1% 0;
        position: relative;
      }

      .input-group i {
        position: absolute;
        color: #000;
      }

      input:focus {
        background-color: transparent;
        outline: transparent;
        border: none;
        border-bottom: 2px solid rgb(0, 191, 255);
      }

      input::placeholder {
        color: transparent;
      }

      label {
        color: #757575;
        position: relative;
        left: 1.2em;
        top: -1.3em;
        cursor: auto;
        transition: 0.3s ease all;
      }

      input:focus ~ label,
      input:not(:placeholder-shown) ~ label {
        top: -3em;
        color: rgb(0, 191, 255);
        font-size: 15px;
      }

      .recover {
        text-align: right;
        font-size: 1rem;
        margin-bottom: 1rem;
      }

      .recover a {
        text-decoration: none;
        color: rgb(125, 125, 235);
      }

      .recovery a:hover {
        color: blue;
        text-decoration: underline;
      }

      .btn {
        font-size: 1.1rem;
        padding: 8px 0;
        text-align: center;
        border-radius: 20px;
        outline: none;
        border: none;
        width: 100%;
        background: rgb(0, 191, 255);
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #08001f;
        border-radius: 20px;
      }

      .or {
        font-size: 1.1rem;
        margin-top: 0.5rem;
        text-align: center;
      }

      .icons {
        text-align: center;
      }

      .icons a {
        text-decoration: none;
        display: flex;
        justify-content: center;
      }

      .icons i {
        color: rgb(0, 191, 255);
        padding: 0.8rem 1.5rem;
        border-radius: 10px;
        font-size: 1.5rem;
        cursor: pointer;
        border: 2px solid #dfe9f5;
        margin: 0 15px;
        transition: 1s;
      }

      .icons i:hover {
        background: #07001f;
        font-size: 1.6rem;
        border: 2px solid rgb(125, 125, 235);
      }

      .links {
        display: flex;
        justify-content: space-around;
        padding: 0 3rem;
        margin-top: 0.9rem;
        font-weight: bold;
      }

      button {
        color: rgb(0, 191, 255);
        background-color: transparent;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
      }

      .btn:active {
        color: rgb(125, 125, 235);
        background-color: #bcb9b9;
      }

      /* pop up */
      .popup {
        width: 400px;
        background-color: #000;
        border-radius: 10px;
        position: absolute;
        top: 0%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.1);
        text-align: center;
        padding-left: 0 30px 30px;
        outline: 2000px solid rgba(0, 0, 0, 0.775);
        box-shadow: 0 0px 40px rgb(0, 191, 255);
        color: #333;
        visibility: hidden;
        transition: transform 0.3s, top 0.3s;
      }

      .open-popup {
        visibility: visible;
        top: 50%;
        transform: translate(-50%, -50%) scale(1.1);
      }

      .popup img {
        width: 100px;
        margin-top: -50px;
        border-radius: 50%;
        margin-bottom: -10%;
      }

      .popup h2 {
        font-size: 38px;
        font-weight: 500;
        margin: 30px 0 10px;
        color: #fff;
      }

      .popup p {
        color: #fff;
      }

      .popbtn {
        width: 80%;
        margin-bottom: 3%;
        margin-top: 50px;
        padding: 10px 0;
        background-color: rgb(0, 191, 255);
        color: #fff;
        border: 0;
        outline: none;
        font-size: 18px;
        border-radius: 4px;
        cursor: pointer;
        box-shadow: 0 0px 7px #989595;
      }

      @media (max-width: 425px) {
        #login {
          width: 75%;
          max-width: 350px;
          padding-bottom: -30%;
        }

        #limg {
          scale: 0.8;
          border-radius: 50%;
        }

        .keys {
          margin-top: -38%;
          scale: 0.94;
          width: 150%;
          margin-left: -26%;
        }

        .lbtn {
          padding: 5px 10px;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        #lbody {
          padding-bottom: -30%;
        }

        .prompt {
          scale: 0.8;
          padding-bottom: 30%;
        }

        #popup {
          margin-left: 2%;
        }

        #popicon2 {
          padding-bottom: 10%;
        }
      }

      @media (min-width: 426px) and (max-width: 768px) {
        #login {
          width: 75%;
          max-width: 350px;
          padding-bottom: -30%;
        }
        .lbtn {
          padding: 5px 10px;
        }

        .form-box {
          display: none;
        }
        #limg {
          scale: 0.8;
          border-radius: 50%;
        }

        .keys {
          margin-top: -10%;
          scale: 0.94;
          width: 130%;
          margin-left: -16%;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        #lbody {
          padding-bottom: -30%;
        }
      }

      @media (max-width: 768px) {
        .container1 {
          width: 50%;
          padding: 1.2rem;
          margin: 100px auto;
        }

        form {
          margin: 0 1rem;
        }
      }

      @media (max-width: 480px) {
        .container1 {
          width: 90%;
          margin: 80px auto;
        }

        .icons {
          scale: 0.5;
          display: flex;
          width: 100%;
        }

        .icons p {
          scale: 0.7;
        }

        .form-title {
          font-size: 1.3rem;
          padding: 1rem;
        }

        .input-group {
          padding: 0.5rem 0;
        }

        .btn {
          font-size: 1rem;
          padding: 10px 0;
        }

        .popup {
          width: 90%;
          padding: 1rem;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
        }
      }
    </style>
  </head>
  <body id="reduce">
    <div class="container1" id="signIn">
      <h1 class="form-title" style="color: #000">Sign In</h1>
      <section>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input
            type="text"
            name="fName"
            id="userName"
            autocomplete="username"
            placeholder="First Name"
          />
          <label for="fName">First Name</label>
        </div>

        <div class="input-group">
          <i class="fas fa-key"></i>
          <input
            type="password"
            name="password"
            id="password"
            autocomplete="current-password"
            placeholder="Password"
          />
          <label for="password">Password</label>
        </div>
        <button type="submit" class="btn" onclick="openPopup()">Sign In</button>
        <p class="or">---------- or ----------</p>

        <div class="icons">
          <a href="">
            <i class="fab fa-google"></i>
            <i class="fab fa-facebook"></i>
          </a>
        </div>
      </section>
      <div class="popup" id="popup">
        <div class="lbody">
          <img
            src="/assets/icons/bitcoin-icons--verify-filled.svg"
            alt="icon"
            style="scale: 0.7"
            id="popimg2"
          />
          <h1
            style="margin-left: 85%; margin-top: -5%; cursor: pointer"
            onclick="closePopup()"
          >
            <span style="color: #ff0000; font-size: 24px">❌</span>
          </h1>
          <h2>Thank you!</h2>
          <p>Your details have successfully been submitted. Thanks!</p>
          <a href="page.html"
            ><button
              type="button"
              onclick="setUserName()"
              id="myBtn"
              class="popbtn"
            >
              Continue
            </button></a
          >
        </div>
      </div>
    </div>
    <script>
      let popup = document.getElementById("popup");
      let login = document.getElementById("login");
      let reduce = document.getElementById("reduce");

      function openPopup() {
        popup.classList.add("open-popup");
        reduce.classList.add("reduce-opacity");
      }

      function closePopup() {
        popup.classList.remove("open-popup");
        reduce.classList.remove("reduce-opacity");
      }
    </script>
  </body>
</html>
