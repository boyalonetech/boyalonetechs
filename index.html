<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http - http-equiv="refresh" content="2;page.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/assets/images/5f9972fd-aae7-4eff-9318-2e4c8eb8c028.jpg" />
    <link rel="stylesheet" href="styles/styles.css" />
    <title>Software Engineer | Boy Alone Tech</title>
    <meta
      name="description"
      content="Discover the best Software Engineers and Web Developers for your project. Learn about their experience, skills, and career paths."
    />
    <link
      rel="canonical"
      href="https://boyalonetech.netlify.app/best-software-engineers"
    />
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: radial-gradient(rgb(0, 191, 255), #000);
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
      }

      h1 {
        opacity: 0;
        font-size: clamp(1rem, 4vw, 3rem);
        transition: opacity 1s ease-in-out;
      }

      .circle {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: 6px solid rgb(206, 4, 206);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transform: scale(0);
        animation: popIn 1.5s ease forwards;
        margin: 20px auto;
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0);
        }
        to {
          opacity: 1;
          transform: scale(0.7);
        }
      }

      .checkmark {
        display: none;
        font-size: 1.5rem;
        color: rgb(206, 4, 206);
      }

      .circle.show .checkmark {
        display: block;
        animation: fadeIn 0.5s ease forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .loader {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
      }

      .circle1 {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background-color: rgb(206, 4, 206);
        animation: bounce 1.4s infinite ease-in-out both;
      }

      .circle1:nth-child(1) {
        animation-delay: -0.32s;
      }
      .circle1:nth-child(2) {
        animation-delay: -0.16s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1.2);
        }
      }

      @media (max-width: 768px) {
        h1 {
          font-size: clamp(1.5rem, 5vw, 3rem);
        }
        .circle {
          width: 50px;
          height: 50px;
        }
        .checkmark {
          font-size: 1.2rem;
        }
        .circle1 {
          width: 12px;
          height: 12px;
        }

        .containerimg {
          display: flex;
          justify-content: center;
        }

        .sub-container img {
          width: 15vw;
        }
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.5rem;
        }

        .sub-container img {
          width: 20vw;
        }

        .circle {
          width: 40px;
          height: 40px;
        }
        .checkmark {
          font-size: 1rem;
        }
        .circle1 {
          width: 10px;
          height: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="sub-container">
      <div class="containerimg">
        <img
          src="/assets/images/5f9972fd-aae7-4eff-9318-2e4c8eb8c028.jpg"
          alt="logo"
          width="80"
        />
      </div>
      <h1 class="web">Welcome</h1>
      <div class="circle" id="circle">
        <span class="checkmark">✔</span>
      </div>
    </div>
    <div class="loader">
      <div class="circle1"></div>
      <div class="circle1"></div>
      <div class="circle1"></div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(() => {
          document.querySelector(".web").style.opacity = "1";
        }, 500);

        setTimeout(() => {
          document.getElementById("circle").classList.add("show");
        }, 1000);
      });
    </script>
  </body>
</html>
