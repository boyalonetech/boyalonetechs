<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="/styles/styles.css" />
  </head>
  <body>
    <div class="container1" id="signIn">
      <h1 class="form-title" style="color: #000">Register</h1>
      <form action="#" method="POST">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input
            type="text"
            name="fName"
            id="fName"
            autocomplete="username"
            placeholder="First Name"
            required
          />
          <label for="fName">First Name</label>
        </div>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input
            type="text"
            name="lName"
            id="lName"
            autocomplete="username"
            placeholder="Last Name"
            required
          />
          <label for="lName">Last Name</label>
        </div>
        <div class="input-group">
          <i class="fa fa-envelope"></i>
          <input
            type="email"
            name="email"
            id="email"
            autocomplete="email"
            placeholder="Email"
            required
          />
          <label for="email">Email</label>
          <div class="input-group">
            <i class="fas fa-key"></i>
            <input
              type="password"
              name="password"
              id="password"
              autocomplete="current-password"
              placeholder="Password"
              required
            />
            <label for="password">Password</label>
          </div>
        </div>
        <input type="submit" value="Sign Up" class="btn" name="SignUp" />
        <p class="or">----------or----------</p>

        <div class="icons">
          <i class="fab fa-google"></i>
          <i class="fab fa-facebook"></i>
        </div>

        <div class="links">
          <p>Already Have Account ?</p>
          <button id="signInButton">Sign in</button>
        </div>
      </form>
    </div>

    <div class="container1" id="signUp" style="display: none">
      <h1 class="form-title" style="color: #000">Sign In</h1>
      <form action="" method="POST">
        <div class="input-group">
          <i class="fa fa-envelope"></i>
          <input
            type="email"
            name="email"
            id="email"
            autocomplete="email"
            placeholder="Email"
            required
          />
          <label for="email">Email</label>
          <div class="input-group">
            <i class="fas fa-key"></i>
            <input
              type="password"
              name="password"
              id="password"
              autocomplete="current-password"
              placeholder="Password"
              required
            />
            <label for="password">Password</label>
          </div>
        </div>
        <p class="recover">
          <a href="#">Recover Password</a>
        </p>
        <input type="submit" value="Sign Up" class="btn" name="SignIn" />
        <p class="or">----------or----------</p>

        <div class="icons">
          <i class="fab fa-google"></i>
          <i class="fab fa-facebook"></i>
        </div>

        <div class="links">
          <p>Don't Have Account ?</p>
          <button id="signUpButton">Sign Up</button>
        </div>
      </form>
    </div>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "poppins", sans-serif;
      }

      body {
        background-color: #c9d6ff;
        background: linear-gradient(to right, #000, rgb(0, 191, 255));
      }

      .container1 {
        background: #fff;
        width: 450px;
        padding: 1.5rem;
        margin: 50px auto;
        border-radius: 10px;
        box-shadow: 0 30px 35px rgba(0, 0, 1, 0.9);
      }
      .links p {
        color: #000;
      }

      form {
        margin: 0 2rem;
      }

      .form-title {
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        padding: 1.3rem;
        margin-bottom: 0.4rem;
      }

      input {
        /* text-decoration: none; */
        counter-reset: inherit;
        width: 100%;
        background-color: transparent;
        border: none;
        border-bottom: 1px solid #757575;
        padding-left: 1.5rem;
        font-size: 15px;
      }

      .input-group {
        padding: 1% 0;
        position: relative;
      }

      .input-group i {
        position: absolute;
        color: #000;
      }

      input:focus {
        background-color: transparent;
        outline: transparent;
        border: none;
        border-bottom: 2px solid rgb(0, 191, 255);
      }

      input::placeholder {
        color: transparent;
      }

      label {
        color: #757575;
        position: relative;
        left: 1.2em;
        top: -1.3em;
        cursor: auto;
        transition: 0.3s ease all;
      }

      input:focus ~ label,
      input:not(:placeholder-shown) ~ label {
        top: -3em;
        color: rgb(0, 191, 255);
        font-size: 15px;
      }

      .recover {
        text-align: right;
        font-size: 1rem;
        margin-bottom: 1rem;
      }

      .recover a {
        text-decoration: none;
        color: rgb(125, 125, 235);
      }

      .recovery a:hover {
        color: blue;
        text-decoration: underline;
      }

      .btn {
        font-size: 1.1rem;
        padding: 8px 0;
        border-radius: 5px;
        outline: none;
        border: none;
        width: 100%;
        background: rgb(0, 191, 255);
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #08001f;
        border-radius: 20px;
      }

      .or {
        font-size: 1.1rem;
        margin-top: 0.5rem;
        text-align: center;
      }

      .icons {
        text-align: center;
      }

      .icons i {
        color: rgb(0, 191, 255);
        padding: 0.8rem 1.5rem;
        border-radius: 10px;
        font-size: 1.5rem;
        cursor: pointer;
        border: 2px solid #dfe9f5;
        margin: 0 15px;
        transition: 1s;
      }

      .icons i:hover {
        background: #07001f;
        font-size: 1.6rem;
        border: 2px solid rgb(125, 125, 235);
      }

      .links {
        display: flex;
        justify-content: space-around;
        padding: 0 3rem;
        margin-top: 0.9rem;
        font-weight: bold;
      }

      button {
        color: rgb(0, 191, 255);
        background-color: transparent;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
      }

      button:hover {
        text-decoration: underline;
        color: rgb(202, 19, 202);
      }

      .btn:active {
        color: rgb(125, 125, 235);
        background-color: #bcb9b9;
      }
    </style>

    <script>
      // ================ Login Page ================
      const signUpButton = document.getElementById("signUpButton");
      const signInButton = document.getElementById("signInButton");
      const signInForm = document.getElementById("signIn");
      const signUpForm = document.getElementById("signUp");

      signUpButton.addEventListener("click", function () {
        signInForm.style.display = "block";
        signUpForm.style.display = "none";
      });

      signInButton.addEventListener("click", function () {
        signInForm.style.display = "none";
        signUpForm.style.display = "block";
      });
    </script>
  </body>
</html>
